; reverse_engineering DAQ node firmware.
;
; Three build environments, one main.cpp (selected by DAQ_FRONTEND - see main.cpp's top
; comment for the full picture):
;
;   daq_scpi_scope  (default) - pulls :WAVeform:DATA? from a real bench oscilloscope over
;                     SCPI-RAW (TCP/5025). No DWS_ENABLE_* flags needed beyond DWS_ENABLE_SCPI.
;   daq_adc_dma     - a bare-metal AD9226/AD9238-class ADC front end drained over
;                     services/dma (SPI/UART) -> preempt_queue -> trace_capture.
;   daq_adc_audio   - no external ADC chip at all: the ESP32's own built-in ADC, polled, off a
;                     $1-2 piezo/electret mic - audio-band acoustic side-channel capture.
;
; Neither WiFi nor the analysis-engine / scope addresses are committed: fill them from your
; environment, same convention as pentesting/rig_firmware:
;
;   DAQ_WIFI_SSID='your-ssid' DAQ_WIFI_PASS='your-pass' \
;     DAQ_SCOPE_HOST='192.168.1.60' DAQ_ANALYSIS_HOST='192.168.1.50' \
;     pio run -e daq_scpi_scope -t upload --upload-port COM7

[env:daq_scpi_scope]
platform = espressif32 @ ^6.13.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DWIFI_SSID=\"${sysenv.DAQ_WIFI_SSID}\"
    -DWIFI_PASS=\"${sysenv.DAQ_WIFI_PASS}\"
    -DSCOPE_HOST=\"${sysenv.DAQ_SCOPE_HOST}\"
    -DANALYSIS_HOST=\"${sysenv.DAQ_ANALYSIS_HOST}\"
    -DANALYSIS_PORT=8080
    -DDAQ_FRONTEND=DAQ_FRONTEND_SCPI_SCOPE
    -DDWS_ENABLE_SCPI=1
    -DWITH_TRIGGER=1
    -DDWS_ENABLE_NTP=1 ; wall-clock timestamping (wall_clock_us_now(), see main.cpp)
; Consume the library from the repo root (one level up) without copying.
lib_deps = symlink://..
build_src_filter = +<*>

; Free-run variant (no scope trigger armed - "the output of an oscope ... without
; triggering"): just polls :WAVeform:DATA? continuously. Same command wiring otherwise.
[env:daq_scpi_scope_freerun]
extends = env:daq_scpi_scope
build_flags =
    ${env:daq_scpi_scope.build_flags}
    -UWITH_TRIGGER
    -DWITH_TRIGGER=0

[env:daq_adc_dma]
extends = env:daq_scpi_scope
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DWIFI_SSID=\"${sysenv.DAQ_WIFI_SSID}\"
    -DWIFI_PASS=\"${sysenv.DAQ_WIFI_PASS}\"
    -DANALYSIS_HOST=\"${sysenv.DAQ_ANALYSIS_HOST}\"
    -DANALYSIS_PORT=8080
    -DDWS_ENABLE_NTP=1 ; wall-clock timestamping (wall_clock_us_now(), see main.cpp)
    -DDAQ_FRONTEND=DAQ_FRONTEND_ADC_DMA
    -DDWS_ENABLE_DMA=1
    -DDWS_DMA_SIMULATE=1
    ; DWS_DMA_BUF_SIZE (bytes/DMA chunk = 512 16-bit codes) and DWS_PQ_ITEM_SIZE (the
    ; preempting-queue item main.cpp's dma_msg must fit: 2-byte len + DWS_DMA_BUF_SIZE
    ; bytes, +4 slack) are kept in sync by hand - main.cpp static_asserts if they drift.
    -DDWS_DMA_BUF_SIZE=1024
    -DDWS_DMA_CHANNELS=1
    -DDWS_ENABLE_PREEMPT_QUEUE=1
    -DDWS_PQ_ITEM_SIZE=1030
    -DDWS_ENABLE_TRACE_CAPTURE=1
    ; DWS_TC_MAX_WINDOW_SAMPLES must be >= (DAQ_PRETRIGGER_MS + DAQ_POSTTRIGGER_MS) * DAQ_SAMPLE_RATE_HZ / 1000
    ; (main.cpp defaults: (2.0 + 6.0)ms * 2 MHz = 16000 samples; 16384 leaves headroom).
    -DDWS_TC_MAX_WINDOW_SAMPLES=16384
    -DDWS_ENABLE_AD9238=1

; No external ADC chip: the ESP32's own built-in ADC, polled off AUDIO_ADC_PIN (default GPIO34),
; feeding a piezo disc or electret mic through a simple AC-coupled preamp. Auto-triggers on a
; rolling-RMS rise over the learned ambient floor - "capture what happened when you made a
; sound" needs no external trigger wiring. See adc_profiles.h's DAQ_ADC_INTERNAL_AUDIO note.
[env:daq_adc_audio]
extends = env:daq_scpi_scope
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DWIFI_SSID=\"${sysenv.DAQ_WIFI_SSID}\"
    -DWIFI_PASS=\"${sysenv.DAQ_WIFI_PASS}\"
    -DANALYSIS_HOST=\"${sysenv.DAQ_ANALYSIS_HOST}\"
    -DANALYSIS_PORT=8080
    -DDWS_ENABLE_NTP=1
    -DDAQ_FRONTEND=DAQ_FRONTEND_ADC_DMA
    -DDAQ_ADC_PROFILE=DAQ_ADC_INTERNAL_AUDIO
    -DDWS_ENABLE_TRACE_CAPTURE=1
    ; DWS_TC_MAX_WINDOW_SAMPLES must be >= (DAQ_PRETRIGGER_MS + DAQ_POSTTRIGGER_MS) * DAQ_SAMPLE_RATE_HZ / 1000
    ; (main.cpp's audio-profile defaults: (20 + 200)ms * 20 kHz = 4400 samples; 8192 leaves headroom).
    -DDWS_TC_MAX_WINDOW_SAMPLES=8192
