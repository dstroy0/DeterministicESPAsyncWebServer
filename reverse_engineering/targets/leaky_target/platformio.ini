; leaky_target - a real, physically-probeable AES SubBytes target (see src/main.cpp).
; No library services needed beyond the shared AES S-box table, so this stays a plain
; Arduino sketch pointed at the repo for shared_primitives/aes_sbox.h.
;
;   pio run -e vulnerable -t upload --upload-port COM7
;   pio run -e hardened   -t upload --upload-port COM7

[env]
platform = espressif32 @ ^6.13.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
; Consume shared_primitives/aes_sbox.h from the repo root (three levels up) without copying.
lib_deps = symlink://../../..
build_src_filter = +<*>

[env:vulnerable]
build_flags =
    ${env.build_flags}
    -DTARGET_HARDENED=0

[env:hardened]
build_flags =
    ${env.build_flags}
    -DTARGET_HARDENED=1
