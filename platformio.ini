[platformio]
default_envs = esp32dev

[env:esp32dev]
; Pinned for reproducibility. Official espressif32 (Arduino core 2.0.x) bundles
; mbedtls v2; Arduino core 3.x bundles mbedtls v3. ssh_rsa.cpp supports BOTH via
; MBEDTLS_VERSION_MAJOR guards, so either platform builds. See docs/TODO.md
; "Build / toolchain".
platform = espressif32 @ ^6.0.0
board = esp32dev
framework = arduino
monitor_speed = 115200

; Shared flags for all native environments
[native_base]
platform = native
build_flags =
    -std=c++14
    -I test/mocks
    -I src
test_build_src = yes

; >>> GENERATED TEST ENVS - do not edit below; edit test/test_matrix.json and run test/gen_test_envs.py >>>
; Single source of truth: test/test_matrix.json  (85 native envs)

; Layers 4-6: transport + session + presentation + standalone parser (no app layer)
; These suites predate the RFC 7230 §5.4 Host rule and feed bare HTTP/1.1
; request lines to exercise parser mechanics; Host enforcement is verified
; separately in env:native_compliance.
[env:native]
extends = native_base
build_flags =
    ${native_base.build_flags}
    -DDETWS_ENFORCE_HOST_HEADER=0
build_src_filter =
    +<network_drivers/presentation/http_parser/http_parser.cpp>
    +<network_drivers/transport/listener.cpp>
    +<network_drivers/transport/transport.cpp>
    +<network_drivers/presentation/presentation.cpp>
    +<network_drivers/session/session.cpp>
    +<network_drivers/session/scratch.cpp>
    +<network_drivers/session/worker.cpp>
    +<network_drivers/presentation/sha1/sha1.cpp>
    +<network_drivers/presentation/base64/base64.cpp>
    +<network_drivers/presentation/websocket/websocket.cpp>
    +<network_drivers/presentation/sse/sse.cpp>
    +<network_drivers/presentation/multipart/multipart.cpp>
test_filter =
    test_transport
    test_presentation
    test_session
    test_http_parser
    test_websocket
    test_sse

; Transport observability (DETWS_ENABLE_OBSERVABILITY): the det_conn_on_event
; hook, by-reason counters, the live CONN_CLOSING gauge, and that the real lwIP
; callbacks (recv FIN / error / timeout / local close / backpressure) drive the
; right counter. Pure L4 core - host-tested.
[env:native_observability]
extends = native_base
build_flags =
    ${native_base.build_flags}
    -DDETWS_ENABLE_OBSERVABILITY=1
build_src_filter =
    +<network_drivers/transport/transport.cpp>
    +<network_drivers/transport/listener.cpp>
test_filter =
    test_observability

; Parser streaming-body hook (OTA) - exercises http_parser with DETWS_ENABLE_OTA=1
; using a mock sink (no ESP32 Update dependency).
[env:native_ota]
extends = native_base
build_flags =
    ${native_base.build_flags}
    -DDETWS_ENFORCE_HOST_HEADER=0
    -DDETWS_ENABLE_OTA=1
build_src_filter =
    +<network_drivers/presentation/http_parser/http_parser.cpp>
test_filter =
    test_http_ota

; Provisioning form-field parser - the only host-testable part of the captive
; portal (softAP / lwIP UDP / NVS are ESP32-only and compiled out here).
[env:native_prov]
extends = native_base
build_src_filter =
    +<services/provisioning_service.cpp>
test_filter =
    test_provisioning

