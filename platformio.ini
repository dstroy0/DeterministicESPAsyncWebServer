[platformio]
default_envs = esp32dev

[env:esp32dev]
; Pinned for reproducibility. Official espressif32 (Arduino core 2.0.x) bundles
; mbedtls v2; Arduino core 3.x bundles mbedtls v3. ssh_rsa.cpp supports BOTH via
; MBEDTLS_VERSION_MAJOR guards, so either platform builds. See docs/TODO.md
; "Build / toolchain".
platform = espressif32 @ ^6.0.0
board = esp32dev
framework = arduino
monitor_speed = 115200

; Shared flags for all native environments
[native_base]
platform = native
build_flags =
    -std=c++14
    -I test/mocks
    -I src
test_build_src = yes

; Layers 4-6: transport + session + presentation + standalone parser (no app layer)
; These suites predate the RFC 7230 §5.4 Host rule and feed bare HTTP/1.1
; request lines to exercise parser mechanics; Host enforcement is verified
; separately in env:native_compliance.
[env:native]
extends = native_base
build_flags =
    -std=c++14
    -I test/mocks
    -I src
    -DDETWS_ENFORCE_HOST_HEADER=0
build_src_filter =
    +<network_drivers/presentation/http_parser.cpp>
    +<network_drivers/transport/listener.cpp>
    +<network_drivers/transport/transport.cpp>
    +<network_drivers/presentation/presentation.cpp>
    +<network_drivers/session/session.cpp>
    +<network_drivers/session/scratch.cpp>
    +<network_drivers/presentation/sha1.cpp>
    +<network_drivers/presentation/base64.cpp>
    +<network_drivers/presentation/websocket.cpp>
    +<network_drivers/presentation/sse.cpp>
    +<network_drivers/presentation/multipart.cpp>
test_filter =
    test_transport
    test_presentation
    test_session
    test_http_parser
    test_websocket
    test_sse

; Parser streaming-body hook (OTA) - exercises http_parser with DETWS_ENABLE_OTA=1
; using a mock sink (no ESP32 Update dependency).
[env:native_ota]
extends = native_base
build_flags =
    -std=c++14
    -I test/mocks
    -I src
    -DDETWS_ENFORCE_HOST_HEADER=0
    -DDETWS_ENABLE_OTA=1
build_src_filter =
    +<network_drivers/presentation/http_parser.cpp>
test_filter =
    test_http_ota

; Provisioning form-field parser - the only host-testable part of the captive
; portal (softAP / lwIP UDP / NVS are ESP32-only and compiled out here).
[env:native_prov]
extends = native_base
build_flags =
    -std=c++14
    -I test/mocks
    -I src
build_src_filter =
    +<services/provisioning_service.cpp>
test_filter =
    test_provisioning

; SSH crypto layer (native software paths only, no mbedtls dependency)
[env:native_ssh]
extends = native_base
build_src_filter =
    +<network_drivers/presentation/ssh/ssh_sha256.cpp>
    +<network_drivers/presentation/ssh/ssh_hmac_sha256.cpp>
    +<network_drivers/presentation/ssh/ssh_aes256ctr.cpp>
    +<network_drivers/presentation/ssh/ssh_bignum.cpp>
    +<network_drivers/presentation/ssh/ssh_keymat.cpp>
    +<network_drivers/presentation/ssh/ssh_dh.cpp>
    +<network_drivers/presentation/ssh/ssh_rsa.cpp>
    +<network_drivers/presentation/ssh/ssh_packet.cpp>
    +<network_drivers/presentation/ssh/ssh_transport.cpp>
    +<network_drivers/presentation/ssh/ssh_auth.cpp>
    +<network_drivers/presentation/ssh/ssh_channel.cpp>
    +<network_drivers/presentation/ssh/ssh_server.cpp>
    +<network_drivers/session/scratch.cpp>
test_filter =
    test_ssh_crypto
    test_ssh_transport
    test_ssh_auth
    test_ssh_channel
    test_ssh_server

; SSH built with password auth disabled (publickey-only hardening)
[env:native_ssh_hardened]
extends = native_base
build_flags =
    -std=c++14
    -I test/mocks
    -I src
    -DDETWS_SSH_ALLOW_PASSWORD=0
build_src_filter =
    +<network_drivers/presentation/ssh/ssh_sha256.cpp>
    +<network_drivers/presentation/ssh/ssh_hmac_sha256.cpp>
    +<network_drivers/presentation/ssh/ssh_aes256ctr.cpp>
    +<network_drivers/presentation/ssh/ssh_bignum.cpp>
    +<network_drivers/presentation/ssh/ssh_keymat.cpp>
    +<network_drivers/presentation/ssh/ssh_dh.cpp>
    +<network_drivers/presentation/ssh/ssh_rsa.cpp>
    +<network_drivers/presentation/ssh/ssh_packet.cpp>
    +<network_drivers/presentation/ssh/ssh_transport.cpp>
    +<network_drivers/presentation/ssh/ssh_auth.cpp>
    +<network_drivers/presentation/ssh/ssh_channel.cpp>
    +<network_drivers/presentation/ssh/ssh_server.cpp>
    +<network_drivers/session/scratch.cpp>
test_filter =
    test_ssh_hardening

; SSH wired through the real transport/session layers (PROTO_SSH byte-pump)
[env:native_ssh_conn]
extends = native_base
build_flags =
    -std=c++14
    -I test/mocks
    -I src
    -DDETWS_ENABLE_SSH=1
build_src_filter =
    +<network_drivers/presentation/http_parser.cpp>
    +<network_drivers/transport/listener.cpp>
    +<network_drivers/transport/transport.cpp>
    +<network_drivers/presentation/presentation.cpp>
    +<network_drivers/session/session.cpp>
    +<network_drivers/session/scratch.cpp>
    +<network_drivers/presentation/sha1.cpp>
    +<network_drivers/presentation/base64.cpp>
    +<network_drivers/presentation/websocket.cpp>
    +<network_drivers/presentation/sse.cpp>
    +<network_drivers/presentation/multipart.cpp>
    +<network_drivers/presentation/ssh/ssh_sha256.cpp>
    +<network_drivers/presentation/ssh/ssh_hmac_sha256.cpp>
    +<network_drivers/presentation/ssh/ssh_aes256ctr.cpp>
    +<network_drivers/presentation/ssh/ssh_bignum.cpp>
    +<network_drivers/presentation/ssh/ssh_keymat.cpp>
    +<network_drivers/presentation/ssh/ssh_dh.cpp>
    +<network_drivers/presentation/ssh/ssh_rsa.cpp>
    +<network_drivers/presentation/ssh/ssh_packet.cpp>
    +<network_drivers/presentation/ssh/ssh_transport.cpp>
    +<network_drivers/presentation/ssh/ssh_auth.cpp>
    +<network_drivers/presentation/ssh/ssh_channel.cpp>
    +<network_drivers/presentation/ssh/ssh_server.cpp>
    +<network_drivers/presentation/ssh/ssh_conn.cpp>
test_filter =
    test_ssh_conn

; Full stack including Layer 7 application
[env:native_app]
extends = native_base
build_flags =
    -std=c++14
    -I test/mocks
    -I src
    -DBODY_BUF_SIZE=512
    -DDETWS_ENFORCE_HOST_HEADER=0
    -DDETWS_ENABLE_STATS=1
    -DDETWS_ENABLE_METRICS=1
    -DDETWS_ENABLE_ETAG=1
    -DDETWS_ENABLE_WEB_TERMINAL=1
build_src_filter =
    +<network_drivers/presentation/http_parser.cpp>
    +<network_drivers/transport/listener.cpp>
    +<network_drivers/transport/transport.cpp>
    +<network_drivers/presentation/presentation.cpp>
    +<network_drivers/session/session.cpp>
    +<network_drivers/session/scratch.cpp>
    +<network_drivers/presentation/sha1.cpp>
    +<network_drivers/presentation/base64.cpp>
    +<network_drivers/presentation/websocket.cpp>
    +<network_drivers/presentation/sse.cpp>
    +<network_drivers/presentation/multipart.cpp>
    +<network_drivers/presentation/ssh/ssh_sha256.cpp>
    +<DeterministicESPAsyncWebServer.cpp>
    +<network_drivers/presentation/json.cpp>
    +<network_drivers/application/web_assets.cpp>
    +<services/web_terminal.cpp>
test_filter =
    test_auth
    test_file_serving
    test_multipart
    test_dispatch
    test_application
    test_response_headers
    test_form_params
    test_path_params
    test_digest_auth
    test_digest_vectors
    test_template
    test_middleware
    test_chunked
    test_json
    test_iface
    test_regex
    test_web_terminal

; SNMP ASN.1 BER codec (the version-agnostic base for the SNMP agent). Pure
; codec - no lwIP/UDP - so it unit-tests on the host.
[env:native_snmp]
extends = native_base
build_flags =
    -std=c++14
    -I test/mocks
    -I src
    -DDETWS_ENABLE_SNMP=1
build_src_filter =
    +<services/snmp/snmp_ber.cpp>
    +<services/snmp/snmp_agent.cpp>
    +<network_drivers/transport/udp_transport.cpp>
test_filter =
    test_snmp_ber
    test_snmp_agent

; SNMPv3 USM layer: auth (HMAC-SHA-256), privacy (AES-128-CFB), engine discovery,
; timeliness. Pulls in the SHA-256/HMAC primitives from the SSH crypto layer.
[env:native_snmp_v3]
extends = native_base
build_flags =
    -std=c++14
    -I test/mocks
    -I src
    -DDETWS_ENABLE_SNMP=1
    -DDETWS_ENABLE_SNMP_V3=1
build_src_filter =
    +<services/snmp/snmp_ber.cpp>
    +<services/snmp/snmp_agent.cpp>
    +<services/snmp/snmp_crypto.cpp>
    +<services/snmp/snmp_v3.cpp>
    +<network_drivers/transport/udp_transport.cpp>
    +<network_drivers/presentation/ssh/ssh_sha256.cpp>
    +<network_drivers/presentation/ssh/ssh_hmac_sha256.cpp>
test_filter =
    test_snmp_v3

; Telnet server (RFC 854 IAC negotiation + line editing) wired through the real
; transport ring buffer; output checked via the tcp_write capture mock.
[env:native_telnet]
extends = native_base
build_flags =
    -std=c++14
    -I test/mocks
    -I src
    -DDETWS_ENABLE_TELNET=1
build_src_filter =
    +<network_drivers/transport/transport.cpp>
    +<network_drivers/transport/listener.cpp>
    +<network_drivers/presentation/telnet.cpp>
test_filter =
    test_telnet

; CoAP server (RFC 7252) message codec + resource dispatch. Pure core - no
; lwIP/UDP - so it unit-tests on the host (udp_transport provides host stubs).
[env:native_coap]
extends = native_base
build_flags =
    -std=c++14
    -I test/mocks
    -I src
    -DDETWS_ENABLE_COAP=1
    -DDETWS_ENABLE_COAP_BLOCK=1
    -DDETWS_COAP_BLOCK_SZX_MAX=2
    -DDETWS_COAP_BLOCK1_MAX=128
build_src_filter =
    +<services/coap/coap.cpp>
    +<network_drivers/transport/udp_transport.cpp>
test_filter =
    test_coap

; WebDAV server core (RFC 4918): method classification, header parsing, XML
; escaping, and the 207 Multi-Status builder. Pure core - no FS/sockets - so it
; unit-tests on the host. The FS-backed handling is HW-tested on a real LittleFS.
[env:native_webdav]
extends = native_base
build_flags =
    -std=c++14
    -I test/mocks
    -I src
    -DDETWS_ENABLE_WEBDAV=1
build_src_filter =
    +<services/webdav/webdav.cpp>
test_filter =
    test_webdav

; Modbus TCP slave core (Modbus Application Protocol): the data model + MBAP/PDU
; codec. Pure core - the TCP transport is ARDUINO-gated - so it unit-tests on the
; host from modbus.cpp alone.
[env:native_modbus]
extends = native_base
build_flags =
    -std=c++14
    -I test/mocks
    -I src
    -DDETWS_ENABLE_MODBUS=1
build_src_filter =
    +<services/modbus/modbus.cpp>
test_filter =
    test_modbus

; HTTP/1.1 keep-alive (persistent connections): full server built with
; DETWS_ENABLE_KEEPALIVE=1; a small per-connection request cap makes the
; fairness-bound test fast. Drives requests through the real transport ring +
; tcp_write capture mock.
[env:native_keepalive]
extends = native_base
build_flags =
    -std=c++14
    -I test/mocks
    -I src
    -DDETWS_ENFORCE_HOST_HEADER=0
    -DDETWS_ENABLE_KEEPALIVE=1
    -DDETWS_KEEPALIVE_MAX_REQUESTS=3
build_src_filter =
    +<network_drivers/presentation/http_parser.cpp>
    +<network_drivers/transport/listener.cpp>
    +<network_drivers/transport/transport.cpp>
    +<network_drivers/presentation/presentation.cpp>
    +<network_drivers/session/session.cpp>
    +<network_drivers/session/scratch.cpp>
    +<network_drivers/presentation/sha1.cpp>
    +<network_drivers/presentation/base64.cpp>
    +<network_drivers/presentation/websocket.cpp>
    +<network_drivers/presentation/sse.cpp>
    +<network_drivers/presentation/multipart.cpp>
    +<network_drivers/presentation/ssh/ssh_sha256.cpp>
    +<DeterministicESPAsyncWebServer.cpp>
test_filter =
    test_keepalive

; HTTP Range requests / 206 Partial Content (RFC 7233): full server built with
; DETWS_ENABLE_RANGE=1, exercising serve_file() against the mock FS (now with
; seek()) via the tcp_write capture mock.
[env:native_range]
extends = native_base
build_flags =
    -std=c++14
    -I test/mocks
    -I src
    -DDETWS_ENFORCE_HOST_HEADER=0
    -DDETWS_ENABLE_RANGE=1
build_src_filter =
    +<network_drivers/presentation/http_parser.cpp>
    +<network_drivers/transport/listener.cpp>
    +<network_drivers/transport/transport.cpp>
    +<network_drivers/presentation/presentation.cpp>
    +<network_drivers/session/session.cpp>
    +<network_drivers/session/scratch.cpp>
    +<network_drivers/presentation/sha1.cpp>
    +<network_drivers/presentation/base64.cpp>
    +<network_drivers/presentation/websocket.cpp>
    +<network_drivers/presentation/sse.cpp>
    +<network_drivers/presentation/multipart.cpp>
    +<network_drivers/presentation/ssh/ssh_sha256.cpp>
    +<DeterministicESPAsyncWebServer.cpp>
test_filter =
    test_range

; Syslog client (RFC 5424) line formatter. Pure formatter - no lwIP/UDP - so it
; unit-tests on the host (udp_transport provides host stubs for det_udp_sendto).
[env:native_syslog]
extends = native_base
build_flags =
    -std=c++14
    -I test/mocks
    -I src
    -DDETWS_ENABLE_SYSLOG=1
build_src_filter =
    +<services/syslog/syslog.cpp>
    +<network_drivers/transport/udp_transport.cpp>
test_filter =
    test_syslog

; JWT (HS256) bearer-auth verification. Pure crypto/codec - reuses the SSH
; HMAC-SHA-256 + base64 primitives - so it unit-tests on the host.
[env:native_jwt]
extends = native_base
build_flags =
    -std=c++14
    -I test/mocks
    -I src
    -DDETWS_ENABLE_JWT=1
build_src_filter =
    +<services/jwt/jwt.cpp>
    +<network_drivers/presentation/base64.cpp>
    +<network_drivers/presentation/ssh/ssh_sha256.cpp>
    +<network_drivers/presentation/ssh/ssh_hmac_sha256.cpp>
test_filter =
    test_jwt

; Streaming file upload: POST body -> FS file via the parser streaming hook.
; Small BODY_BUF_SIZE exercises multi-chunk streaming; the mock FS captures the
; written bytes (test/mocks/FS.h write-capture).
[env:native_upload]
extends = native_base
build_flags =
    -std=c++14
    -I test/mocks
    -I src
    -DDETWS_ENFORCE_HOST_HEADER=0
    -DDETWS_ENABLE_UPLOAD=1
    -DBODY_BUF_SIZE=64
build_src_filter =
    +<network_drivers/presentation/http_parser.cpp>
    +<network_drivers/transport/listener.cpp>
    +<network_drivers/transport/transport.cpp>
    +<network_drivers/presentation/presentation.cpp>
    +<network_drivers/session/session.cpp>
    +<network_drivers/session/scratch.cpp>
    +<network_drivers/presentation/sha1.cpp>
    +<network_drivers/presentation/base64.cpp>
    +<network_drivers/presentation/websocket.cpp>
    +<network_drivers/presentation/sse.cpp>
    +<network_drivers/presentation/multipart.cpp>
    +<network_drivers/presentation/ssh/ssh_sha256.cpp>
    +<DeterministicESPAsyncWebServer.cpp>
    +<services/upload_service.cpp>
test_filter =
    test_upload

; Outbound HTTP client: URL parser + request builder + response parser. Pure
; string logic (the lwIP/mbedTLS transport is ESP32-only) so it unit-tests host.
[env:native_http_client]
extends = native_base
build_flags =
    -std=c++14
    -I test/mocks
    -I src
    -DDETWS_ENABLE_HTTP_CLIENT=1
build_src_filter =
    +<services/http_client/http_client.cpp>
test_filter =
    test_http_client

; RFC-compliance suite: builds with all enforcement at production defaults
; (DETWS_ENFORCE_HOST_HEADER=1) and exercises the strict behaviors.
[env:native_compliance]
extends = native_base
build_src_filter =
    +<network_drivers/presentation/http_parser.cpp>
test_filter =
    test_compliance

[env:native_mqtt]
extends = native_base
build_flags =
    -std=c++14
    -I test/mocks
    -I src
    -DDETWS_ENABLE_MQTT=1
build_src_filter =
    +<services/mqtt/mqtt.cpp>
test_filter =
    test_mqtt

[env:native_ws_client]
extends = native_base
build_flags =
