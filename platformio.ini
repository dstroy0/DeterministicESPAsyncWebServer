; Runtime build-flag reporter (server.diag() / DETWS_ENABLE_DIAG). The gated
; diag() method + the compile-time DETWS_DIAG_JSON build-info string are enabled by
; no other env, so this one keeps them compiled + exercised in CI. Reuses the full
; app src via the native_app base.
[env:native_diag]
extends = env:native_app
build_flags =
    ${env:native_app.build_flags}
    -DDETWS_ENABLE_DIAG=1
build_src_filter =
    ${env:native_app.build_src_filter}
test_filter =
    test_diag

; SNMP ASN.1 BER codec (the version-agnostic base for the SNMP agent). Pure
; codec - no lwIP/UDP - so it unit-tests on the host.
[env:native_snmp]
extends = native_base
build_flags =
    ${native_base.build_flags}
    -DDETWS_ENABLE_SNMP=1
build_src_filter =
    +<services/snmp/snmp_ber.cpp>
    +<services/snmp/snmp_agent.cpp>
    +<network_drivers/transport/udp_transport.cpp>
test_filter =
    test_snmp_ber
    test_snmp_agent

; SNMPv3 USM layer: auth (HMAC-SHA-256), privacy (AES-128-CFB), engine discovery,
; timeliness. Pulls in the SHA-256/HMAC primitives from the SSH crypto layer.
[env:native_snmp_v3]
extends = native_base
build_flags =
    ${native_base.build_flags}
    -DDETWS_ENABLE_SNMP=1
    -DDETWS_ENABLE_SNMP_V3=1
    -DDETWS_ENABLE_SNMP_TRAP=1
build_src_filter =
    +<services/snmp/snmp_ber.cpp>
    +<services/snmp/snmp_agent.cpp>
    +<services/snmp/snmp_crypto.cpp>
    +<services/snmp/snmp_v3.cpp>
    +<services/snmp/snmp_notify.cpp>
    +<network_drivers/transport/udp_transport.cpp>
    +<network_drivers/presentation/ssh/ssh_sha256.cpp>
    +<network_drivers/presentation/ssh/ssh_hmac_sha256.cpp>
test_filter =
    test_snmp_v3

