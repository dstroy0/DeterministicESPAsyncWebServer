[platformio]
default_envs = esp32dev

[env:esp32dev]
; Pinned for reproducibility. Official espressif32 (Arduino core 2.0.x) bundles
; mbedtls v2; Arduino core 3.x bundles mbedtls v3. ssh_rsa.cpp supports BOTH via
; MBEDTLS_VERSION_MAJOR guards, so either platform builds. See docs/TODO.md
; "Build / toolchain".
platform = espressif32 @ ^6.0.0
board = esp32dev
framework = arduino
monitor_speed = 115200

; Shared flags for all native environments
[native_base]
platform = native
build_flags =
    -std=c++14
    -I test/mocks
    -I test/support
    -I src
test_build_src = yes

; >>> GENERATED TEST ENVS - do not edit below; edit test/test_matrix.json and run test/gen_test_envs.py >>>
; Single source of truth: test/test_matrix.json  (212 native envs)

; CANopen (CiA 301) message codec (services/canopen): NMT, SYNC, heartbeat, EMCY,
; PDO, and expedited SDO read/write/abort + the COB-ID classifier, over the shared CAN
; frame (shared_primitives/can.h). Pure host tests.
[env:native_canopen]
extends = native_base
build_flags =
    ${native_base.build_flags}
    -DDETWS_ENABLE_CANOPEN=1
build_src_filter =
    +<services/canopen/canopen.cpp>
test_filter =
    test_canopen

; Log-structured hash key-value store on the WAL (services/dbm): put/get/delete with an
; in-RAM open-addressed index and value data appended to the write-ahead log, plus index rebuild by
; replaying the log on open. Pure host tests over a RAM-backed WalDev, incl. overwrite, tombstone
; resurrection, persistence across a remount (with and without checkpoint), collisions, index-full
; fail-closed, key/value bounds, and a max-size value round-trip.
[env:native_dbm]
extends = native_base
build_flags =
    ${native_base.build_flags}
    -DDETWS_ENABLE_WAL=1
    -DDETWS_ENABLE_DBM=1
build_src_filter =
    +<services/wal/wal.cpp>
    +<services/wal/wal_store.cpp>
    +<services/dbm/dbm.cpp>
test_filter =
    test_dbm

; Local JSON document store on the WAL (services/docstore): JSON documents addressed by id,
; stored via dbm on the write-ahead log, plus top-level field queries (find documents whose JSON field
; equals a value) via the zero-heap JSON reader. Pure host tests over a RAM-backed WalDev, incl.
; put/get/delete, string/int/bool field finds, persistence + query across a remount, and early stop.
[env:native_docstore]
extends = native_base
build_flags =
    ${native_base.build_flags}
    -DDETWS_ENABLE_WAL=1
    -DDETWS_ENABLE_DBM=1
    -DDETWS_ENABLE_DOCSTORE=1
build_src_filter =
    +<services/wal/wal.cpp>
    +<services/wal/wal_store.cpp>
    +<services/dbm/dbm.cpp>
    +<services/docstore/docstore.cpp>
    +<network_drivers/presentation/json/json.cpp>
test_filter =
    test_docstore

; CNC RS-232 DNC drip-feed codec (services/dnc): the EIA RS-244 <-> ISO/ASCII tape-code
; translation (odd-parity EIA table), ISO even parity, G-code block framing with '%' rewind-stop
; and leader runout, XON/XOFF flow-control state, and a streaming block reassembling decoder. Pure
; host tests, incl. an odd-parity + exact-inverse table guardrail and full encode -> decode program
; round-trips for both tape codes.
[env:native_dnc]
extends = native_base
build_flags =
    ${native_base.build_flags}
    -DDETWS_ENABLE_DNC=1
build_src_filter =
    +<services/dnc/dnc.cpp>
test_filter =
    test_dnc

; Shared no-stdlib primitives (shared_primitives): the base-10 det_strtol/strtoul/strtof
; number parsers (numparse.h) and the strict RFC 3629 UTF-8 validator (utf8.h).
; Header-only; pure host tests.
[env:native_det_primitives]
extends = native_base
build_src_filter =
    -<*>
test_filter =
    test_det_primitives

; IP address core (network_drivers/network/det_ip): RFC 4291 IPv4/IPv6 text parsing,
; RFC 5952 canonical formatting (:: zero-compression, v4-mapped), and scope classification
; (loopback / link-local / private-ULA / multicast / global). Pure host tests.
[env:native_det_ip]
extends = native_base
build_src_filter =
    +<network_drivers/network/ip.cpp>
test_filter =
    test_det_ip

; Unified double-ended server arena (network_drivers/session/det_arena): first-fit
; persistent end (bottom, individual free + coalesce + boundary shrink) + bump scratch end
; (top, mark/release/reset) sharing a floating middle; fail-closed at the boundary. Host tests.
[env:native_det_arena]
extends = native_base
build_src_filter =
    +<network_drivers/session/arena.cpp>
test_filter =
    test_det_arena

; Modern SSH crypto KATs (curve25519-sha256 KEX + ssh-ed25519 host key / client auth):
; SHA-512 (FIPS 180-4), X25519 (RFC 7748), Ed25519 (RFC 8032). Vectors are the published RFC
; test vectors + tool-generated digests, grounding the impl against the standards. Pure host tests.
[env:native_ssh_ed25519]
extends = native_base
build_src_filter =
    +<network_drivers/presentation/ssh/crypto/ssh_sha512.cpp>
    +<network_drivers/presentation/ssh/crypto/ssh_curve25519.cpp>
    +<network_drivers/presentation/ssh/crypto/ssh_ed25519.cpp>
test_filter =
    test_ssh_ed25519

; Data-driven external crypto known-answer tests: HMAC-SHA256/512, AEAD_AES_128_GCM,
; X25519, and Ed25519 verify from Project Wycheproof (including its adversarial edge cases),
; plus HKDF-SHA256 Extract (RFC 5869), the ChaCha20 block (RFC 8439 2.4.2), and Poly1305
; (RFC 8439 2.5.2). Vectors are vendored as auditable JSON (test/vectors) and compiled to a
; table by tools/gen_crypto_vectors.py. Pure host tests.
[env:native_crypto_kat]
extends = native_base
build_flags =
    ${native_base.build_flags}
    -DDETWS_ENABLE_HTTP3=1
build_src_filter =
    +<network_drivers/presentation/ssh/crypto/ssh_sha256.cpp>
    +<network_drivers/presentation/ssh/crypto/ssh_sha512.cpp>
    +<network_drivers/presentation/ssh/crypto/ssh_hmac_sha256.cpp>
    +<network_drivers/presentation/ssh/crypto/ssh_hmac_sha512.cpp>
    +<network_drivers/presentation/ssh/crypto/ssh_chacha20.cpp>
    +<network_drivers/presentation/ssh/crypto/ssh_poly1305.cpp>
    +<network_drivers/presentation/ssh/crypto/ssh_curve25519.cpp>
    +<network_drivers/presentation/ssh/crypto/ssh_ed25519.cpp>
    +<network_drivers/presentation/http3/quic_hkdf.cpp>
    +<network_drivers/presentation/http3/quic_aead.cpp>
test_filter =
    test_crypto_kat

; Wi-Fi promiscuous capture helpers (services/promisc): the pure 802.11 MAC header parser
; (to/from-DS src/dst/bssid resolution, QoS, WDS 4-address, control frames, malformed
; rejection) and libpcap (DLT_IEEE802_11) framing. Pure host tests.
[env:native_promisc]
extends = native_base
build_flags =
    ${native_base.build_flags}
    -DDETWS_ENABLE_PROMISC=1
build_src_filter =
    +<services/promisc/promisc.cpp>
test_filter =
    test_promisc

; CAN listen-only capture framing (services/bus_capture): can_to_socketcan() building the
; 16-byte Linux SocketCAN frame (big-endian can_id, EFF/RTR flags, length, data) and the
; DLT_CAN_SOCKETCAN libpcap link type. Pure host tests.
[env:native_bus_capture]
extends = native_base
build_flags =
    ${native_base.build_flags}
    -DDETWS_ENABLE_BUS_CAPTURE=1
build_src_filter =
    +<services/bus_capture/bus_capture.cpp>
test_filter =
    test_bus_capture

; SAE J1939 codec (services/j1939): 29-bit id encode/decode (PDU1 + PDU2), single-frame
; messages, Request PGN, Address Claimed + NAME, and the Transport Protocol (BAM + TP.DT)
; reassembler, over the shared CAN frame. Pure host tests.
[env:native_j1939]
extends = native_base
build_flags =
    ${native_base.build_flags}
    -DDETWS_ENABLE_J1939=1
build_src_filter =
    +<services/j1939/j1939.cpp>
test_filter =
    test_j1939

; DeviceNet link-adaptation codec (services/devicenet): the 4-group 11-bit CAN id,
; explicit-message header octet, single-frame explicit messages, and the fragmentation
; reassembler (CIP over CAN; the CIP body is built with the cip codec). Pure host tests.
[env:native_devicenet]
extends = native_base
build_flags =
    ${native_base.build_flags}
    -DDETWS_ENABLE_DEVICENET=1
build_src_filter =
    +<services/devicenet/devicenet.cpp>
test_filter =
    test_devicenet

; NMEA 2000 codec (services/nmea2000): single-frame messages plus the Fast Packet
; transport (frame count, build, reassembly), built on the J1939 id codec (implied). Pure
; host tests.
[env:native_nmea2000]
extends = native_base
build_flags =
    ${native_base.build_flags}
    -DDETWS_ENABLE_NMEA2000=1
build_src_filter =
    +<services/nmea2000/nmea2000.cpp>
    +<services/j1939/j1939.cpp>
test_filter =
    test_nmea2000

; Wired M-Bus codec (services/mbus): the ACK / short / long frame builders + parser
; (start/stop, doubled length, 8-bit sum checksum) and the EN 13757-3 variable-data record
; walker (DIF/VIF, DIFE/VIFE chains, LVAR). Pure host tests.
[env:native_mbus]
extends = native_base
build_flags =
    ${native_base.build_flags}
    -DDETWS_ENABLE_MBUS=1
build_src_filter =
    +<services/mbus/mbus.cpp>
test_filter =
    test_mbus

; IEC 60870-5-101/-104 codec (services/iec60870): the -104 APCI (I/S/U), the ASDU
; header + 3-octet IOA, and the -101 FT1.2 fixed/variable link frames (sum checksum). Pure
; host tests.
[env:native_iec60870]
extends = native_base
build_flags =
    ${native_base.build_flags}
    -DDETWS_ENABLE_IEC60870=1
build_src_filter =
    +<services/iec60870/iec60870.cpp>
test_filter =
    test_iec60870

; SDI-12 sensor-bus codec (services/sdi12): the command builders, the measurement
; response parser (atttn), the data-value splitter, and the SDI-12 CRC (compute/encode/verify).
; Pure host tests.
[env:native_sdi12]
extends = native_base
build_flags =
    ${native_base.build_flags}
    -DDETWS_ENABLE_SDI12=1
build_src_filter =
    +<services/sdi12/sdi12.cpp>
test_filter =
    test_sdi12

; DMX512 + RDM lighting codec (services/dmx): the DMX512 slot packet (build/get) and the
; RDM (ANSI E1.20) packet build/parse with 48-bit UIDs and the 16-bit additive checksum. Pure
; host tests.
[env:native_dmx]
extends = native_base
build_flags =
    ${native_base.build_flags}
    -DDETWS_ENABLE_DMX=1
build_src_filter =
    +<services/dmx/dmx.cpp>
test_filter =
    test_dmx

; NMEA 0183 sentence codec (services/nmea0183): the XOR checksum, sentence build, parse
; (field splitting, talker/type, checksum validation) against the canonical GGA vector, and the
; field-value helpers. Pure host tests.
[env:native_nmea0183]
extends = native_base
build_flags =
    ${native_base.build_flags}
    -DDETWS_ENABLE_NMEA0183=1
build_src_filter =
    +<services/nmea0183/nmea0183.cpp>
test_filter =
    test_nmea0183

; IO-Link (SDCI) data-link message codec (services/iolink): the MC / CKT / CKS control
; octets and the SDCI checksum (seed 0x52 + the 8->6 compression of IO-Link spec A.1.6), with a
; hand-computed known-answer vector. Pure host tests.
[env:native_iolink]
extends = native_base
build_flags =
    ${native_base.build_flags}
    -DDETWS_ENABLE_IOLINK=1
build_src_filter =
    +<services/iolink/iolink.cpp>
test_filter =
    test_iolink

; Layers 4-6: transport + session + presentation + standalone parser (no app layer)
; These suites predate the RFC 7230 Â§5.4 Host rule and feed bare HTTP/1.1
; request lines to exercise parser mechanics; Host enforcement is verified
; separately in env:native_compliance.
[env:native]
extends = native_base
build_flags =
    ${native_base.build_flags}
    -DDETWS_ENFORCE_HOST_HEADER=0
build_src_filter =
    +<network_drivers/network/ip.cpp>
    +<network_drivers/presentation/http_parser/http_parser.cpp>
    +<network_drivers/transport/listener.cpp>
    +<network_drivers/transport/tcp.cpp>
    +<network_drivers/presentation/presentation.cpp>
    +<network_drivers/session/session.cpp>
    +<network_drivers/session/proto_builtins.cpp>
    +<network_drivers/session/scratch.cpp>
    +<network_drivers/session/worker.cpp>
    +<network_drivers/presentation/sha1/sha1.cpp>
    +<network_drivers/presentation/base64/base64.cpp>
    +<network_drivers/presentation/websocket/websocket.cpp>
    +<network_drivers/presentation/sse/sse.cpp>
    +<network_drivers/presentation/multipart/multipart.cpp>
test_filter =
    test_transport
    test_presentation
    test_session
    test_http_parser
    test_websocket
    test_sse

; Transport observability (DETWS_ENABLE_OBSERVABILITY): the det_conn_on_event
; hook, by-reason counters, the live CONN_CLOSING gauge, and that the real lwIP
; callbacks (recv FIN / error / timeout / local close / backpressure) drive the
; right counter. Pure L4 core - host-tested.
[env:native_observability]
extends = native_base
build_flags =
    ${native_base.build_flags}
    -DDETWS_ENABLE_OBSERVABILITY=1
build_src_filter =
    +<network_drivers/network/ip.cpp>
    +<network_drivers/transport/tcp.cpp>
    +<network_drivers/transport/listener.cpp>
test_filter =
    test_observability

; Accept-time connection gates with their flags ON (DETWS_ENABLE_ACCEPT_THROTTLE
; / PER_IP_THROTTLE / IP_ALLOWLIST): the global fixed-window throttle, the per-source-IP
; bucket table (independent budgets, window rollover, the millis() wrap, bounded LRU
; eviction), and the CIDR source-IP allowlist. Compiles the flag-guarded accept-callback
; paths that no other env builds. Budgets overridden small so the boundaries are explicit.
[env:native_accept_gate]
extends = native_base
build_flags =
    ${native_base.build_flags}
    -DDETWS_ENFORCE_HOST_HEADER=0
    -DDETWS_ENABLE_ACCEPT_THROTTLE=1
    -DDETWS_ENABLE_PER_IP_THROTTLE=1
    -DDETWS_ENABLE_IP_ALLOWLIST=1
    -DDETWS_ACCEPT_THROTTLE_MAX=3
    -DDETWS_ACCEPT_THROTTLE_WINDOW_MS=1000
    -DDETWS_PER_IP_THROTTLE_MAX=2
    -DDETWS_PER_IP_THROTTLE_WINDOW_MS=1000
    -DDETWS_PER_IP_THROTTLE_SLOTS=4
    -DDETWS_IP_ALLOWLIST_SLOTS=4
build_src_filter =
    +<network_drivers/network/ip.cpp>
    +<network_drivers/presentation/http_parser/http_parser.cpp>
    +<network_drivers/transport/listener.cpp>
    +<network_drivers/transport/tcp.cpp>
    +<network_drivers/presentation/presentation.cpp>
    +<network_drivers/session/session.cpp>
    +<network_drivers/session/proto_builtins.cpp>
    +<network_drivers/session/scratch.cpp>
    +<network_drivers/session/worker.cpp>
    +<network_drivers/presentation/sha1/sha1.cpp>
    +<network_drivers/presentation/base64/base64.cpp>
    +<network_drivers/presentation/websocket/websocket.cpp>
    +<network_drivers/presentation/sse/sse.cpp>
    +<network_drivers/presentation/multipart/multipart.cpp>
test_filter =
    test_accept_gate

; Parser streaming-body hook (OTA) - exercises http_parser with DETWS_ENABLE_OTA=1
; using a mock sink (no ESP32 Update dependency).
[env:native_ota]
extends = native_base
build_flags =
    ${native_base.build_flags}
    -DDETWS_ENFORCE_HOST_HEADER=0
