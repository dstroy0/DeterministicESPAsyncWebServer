[platformio]
default_envs = esp32dev

[env:esp32dev]
; Pinned for reproducibility. Official espressif32 (Arduino core 2.0.x) bundles
; mbedtls v2; Arduino core 3.x bundles mbedtls v3. ssh_rsa.cpp supports BOTH via
; MBEDTLS_VERSION_MAJOR guards, so either platform builds. See docs/TODO.md
; "Build / toolchain".
platform = espressif32 @ ^6.0.0
board = esp32dev
framework = arduino
monitor_speed = 115200

; Shared flags for all native environments
[native_base]
platform = native
build_flags =
    -std=c++14
    -I test/mocks
    -I src
test_build_src = yes

; Layers 4-6: transport + session + presentation + standalone parser (no app layer)
; These suites predate the RFC 7230 §5.4 Host rule and feed bare HTTP/1.1
; request lines to exercise parser mechanics; Host enforcement is verified
; separately in env:native_compliance.
[env:native]
extends = native_base
build_flags =
    -std=c++14
    -I test/mocks
    -I src
    -DDETWS_ENFORCE_HOST_HEADER=0
build_src_filter =
    +<network_drivers/presentation/http_parser.cpp>
    +<network_drivers/transport/listener.cpp>
    +<network_drivers/transport/transport.cpp>
    +<network_drivers/presentation/presentation.cpp>
    +<network_drivers/session/session.cpp>
    +<network_drivers/presentation/sha1.cpp>
    +<network_drivers/presentation/base64.cpp>
    +<network_drivers/presentation/websocket.cpp>
    +<network_drivers/presentation/sse.cpp>
    +<network_drivers/presentation/multipart.cpp>
test_filter =
    test_transport
    test_presentation
    test_session
    test_http_parser
    test_websocket
    test_sse

; Parser streaming-body hook (OTA) - exercises http_parser with DETWS_ENABLE_OTA=1
; using a mock sink (no ESP32 Update dependency).
[env:native_ota]
extends = native_base
build_flags =
    -std=c++14
    -I test/mocks
    -I src
    -DDETWS_ENFORCE_HOST_HEADER=0
    -DDETWS_ENABLE_OTA=1
build_src_filter =
    +<network_drivers/presentation/http_parser.cpp>
test_filter =
    test_http_ota

; Provisioning form-field parser - the only host-testable part of the captive
; portal (softAP / lwIP UDP / NVS are ESP32-only and compiled out here).
[env:native_prov]
extends = native_base
build_flags =
    -std=c++14
    -I test/mocks
    -I src
build_src_filter =
    +<services/provisioning_service.cpp>
test_filter =
    test_provisioning

; SSH crypto layer (native software paths only — no mbedtls dependency)
[env:native_ssh]
extends = native_base
build_src_filter =
    +<network_drivers/presentation/ssh/ssh_sha256.cpp>
    +<network_drivers/presentation/ssh/ssh_hmac_sha256.cpp>
    +<network_drivers/presentation/ssh/ssh_aes256ctr.cpp>
    +<network_drivers/presentation/ssh/ssh_bignum.cpp>
    +<network_drivers/presentation/ssh/ssh_keymat.cpp>
    +<network_drivers/presentation/ssh/ssh_dh.cpp>
    +<network_drivers/presentation/ssh/ssh_rsa.cpp>
    +<network_drivers/presentation/ssh/ssh_packet.cpp>
    +<network_drivers/presentation/ssh/ssh_transport.cpp>
    +<network_drivers/presentation/ssh/ssh_auth.cpp>
    +<network_drivers/presentation/ssh/ssh_channel.cpp>
    +<network_drivers/presentation/ssh/ssh_server.cpp>
test_filter =
    test_ssh_crypto
    test_ssh_transport
    test_ssh_auth
    test_ssh_channel
    test_ssh_server

; SSH built with password auth disabled (publickey-only hardening)
[env:native_ssh_hardened]
extends = native_base
build_flags =
    -std=c++14
    -I test/mocks
    -I src
    -DDETWS_SSH_ALLOW_PASSWORD=0
build_src_filter =
    +<network_drivers/presentation/ssh/ssh_sha256.cpp>
    +<network_drivers/presentation/ssh/ssh_hmac_sha256.cpp>
    +<network_drivers/presentation/ssh/ssh_aes256ctr.cpp>
    +<network_drivers/presentation/ssh/ssh_bignum.cpp>
    +<network_drivers/presentation/ssh/ssh_keymat.cpp>
    +<network_drivers/presentation/ssh/ssh_dh.cpp>
    +<network_drivers/presentation/ssh/ssh_rsa.cpp>
    +<network_drivers/presentation/ssh/ssh_packet.cpp>
    +<network_drivers/presentation/ssh/ssh_transport.cpp>
    +<network_drivers/presentation/ssh/ssh_auth.cpp>
    +<network_drivers/presentation/ssh/ssh_channel.cpp>
    +<network_drivers/presentation/ssh/ssh_server.cpp>
test_filter =
    test_ssh_hardening

; SSH wired through the real transport/session layers (PROTO_SSH byte-pump)
[env:native_ssh_conn]
extends = native_base
build_flags =
    -std=c++14
    -I test/mocks
    -I src
    -DDETWS_ENABLE_SSH=1
build_src_filter =
    +<network_drivers/presentation/http_parser.cpp>
    +<network_drivers/transport/listener.cpp>
    +<network_drivers/transport/transport.cpp>
    +<network_drivers/presentation/presentation.cpp>
    +<network_drivers/session/session.cpp>
    +<network_drivers/presentation/sha1.cpp>
    +<network_drivers/presentation/base64.cpp>
    +<network_drivers/presentation/websocket.cpp>
    +<network_drivers/presentation/sse.cpp>
    +<network_drivers/presentation/multipart.cpp>
    +<network_drivers/presentation/ssh/ssh_sha256.cpp>
    +<network_drivers/presentation/ssh/ssh_hmac_sha256.cpp>
    +<network_drivers/presentation/ssh/ssh_aes256ctr.cpp>
    +<network_drivers/presentation/ssh/ssh_bignum.cpp>
    +<network_drivers/presentation/ssh/ssh_keymat.cpp>
    +<network_drivers/presentation/ssh/ssh_dh.cpp>
    +<network_drivers/presentation/ssh/ssh_rsa.cpp>
    +<network_drivers/presentation/ssh/ssh_packet.cpp>
    +<network_drivers/presentation/ssh/ssh_transport.cpp>
    +<network_drivers/presentation/ssh/ssh_auth.cpp>
    +<network_drivers/presentation/ssh/ssh_channel.cpp>
    +<network_drivers/presentation/ssh/ssh_server.cpp>
    +<network_drivers/presentation/ssh/ssh_conn.cpp>
test_filter =
    test_ssh_conn

; Full stack including Layer 7 application
[env:native_app]
extends = native_base
build_flags =
    -std=c++14
    -I test/mocks
    -I src
    -DBODY_BUF_SIZE=512
    -DDETWS_ENFORCE_HOST_HEADER=0
    -DDETWS_ENABLE_STATS=1
    -DDETWS_ENABLE_ETAG=1
build_src_filter =
    +<network_drivers/presentation/http_parser.cpp>
    +<network_drivers/transport/listener.cpp>
    +<network_drivers/transport/transport.cpp>
    +<network_drivers/presentation/presentation.cpp>
    +<network_drivers/session/session.cpp>
    +<network_drivers/presentation/sha1.cpp>
    +<network_drivers/presentation/base64.cpp>
    +<network_drivers/presentation/websocket.cpp>
    +<network_drivers/presentation/sse.cpp>
    +<network_drivers/presentation/multipart.cpp>
    +<DeterministicESPAsyncWebServer.cpp>
test_filter =
    test_auth
    test_file_serving
    test_multipart
    test_dispatch
    test_application
    test_response_headers
    test_form_params

; RFC-compliance suite: builds with all enforcement at production defaults
; (DETWS_ENFORCE_HOST_HEADER=1) and exercises the strict behaviors.
[env:native_compliance]
extends = native_base
build_src_filter =
    +<network_drivers/presentation/http_parser.cpp>
test_filter =
    test_compliance
