[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Shared flags for all native environments
[native_base]
platform = native
build_flags =
    -std=c++14
    -I test/mocks
    -I src
test_build_src = yes

; Layers 4-6: transport + session + presentation (no app layer)
[env:native]
extends = native_base
build_src_filter =
    +<network_drivers/transport.cpp>
    +<network_drivers/presentation.cpp>
    +<network_drivers/session.cpp>
test_filter =
    test_transport
    test_presentation
    test_session

; Full stack including Layer 7 application
[env:native_app]
extends = native_base
build_src_filter =
    +<network_drivers/transport.cpp>
    +<network_drivers/presentation.cpp>
    +<network_drivers/session.cpp>
    +<DeterministicESPAsyncWebServer.cpp>
test_filter =
    test_application
