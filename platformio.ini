[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; Shared flags for all native environments
[native_base]
platform = native
build_flags =
    -std=c++14
    -I test/mocks
    -I src
test_build_src = yes

; Layers 4-6: transport + session + presentation + standalone parser (no app layer)
[env:native]
extends = native_base
build_src_filter =
    +<network_drivers/http_parser.cpp>
    +<network_drivers/transport.cpp>
    +<network_drivers/presentation.cpp>
    +<network_drivers/session.cpp>
    +<network_drivers/sha1.cpp>
    +<network_drivers/base64.cpp>
    +<network_drivers/websocket.cpp>
    +<network_drivers/sse.cpp>
    +<network_drivers/multipart.cpp>
test_filter =
    test_transport
    test_presentation
    test_session
    test_http_parser
    test_websocket
    test_sse

; Full stack including Layer 7 application
[env:native_app]
extends = native_base
build_flags =
    -std=c++14
    -I test/mocks
    -I src
    -DBODY_BUF_SIZE=512
build_src_filter =
    +<network_drivers/http_parser.cpp>
    +<network_drivers/transport.cpp>
    +<network_drivers/presentation.cpp>
    +<network_drivers/session.cpp>
    +<network_drivers/sha1.cpp>
    +<network_drivers/base64.cpp>
    +<network_drivers/websocket.cpp>
    +<network_drivers/sse.cpp>
    +<network_drivers/multipart.cpp>
    +<DeterministicESPAsyncWebServer.cpp>
test_filter =
    test_auth
    test_file_serving
    test_multipart
