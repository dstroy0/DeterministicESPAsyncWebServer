build_flags =
    -std=c++14
    -I test/mocks
    -I src
    -DDETWS_ENABLE_PARTITION_MONITOR=1
build_src_filter =
    +<services/partition_monitor/partition_monitor.cpp>
test_filter =
    test_partition_monitor

; CBOR (RFC 8949) encoder (network_drivers/presentation/cbor): a pure byte-output
; codec, host-tested against the RFC 8949 Appendix A vectors.
[env:native_cbor]
extends = native_base
build_flags =
    -std=c++14
    -I test/mocks
    -I src
    -DDETWS_ENABLE_CBOR=1
build_src_filter =
    +<network_drivers/presentation/cbor.cpp>
test_filter =
    test_cbor

; MessagePack encoder (network_drivers/presentation/msgpack): a pure byte-output
; codec, host-tested against the spec encodings.
[env:native_msgpack]
extends = native_base
build_flags =
    -std=c++14
    -I test/mocks
    -I src
    -DDETWS_ENABLE_MSGPACK=1
build_src_filter =
    +<network_drivers/presentation/msgpack.cpp>
test_filter =
    test_msgpack

; CodeQL coverage env: the full app compiled with every new feature flag ON so
; CodeQL traces the integration paths (CSRF / lockout / allowlist gates,
; permessage-deflate) AND the new service modules, which the per-feature envs scan
; only in isolation. Built (--without-testing) by the CodeQL workflow; one test
; in the filter is enough to pull in the whole src set.
[env:native_codeql]
extends = env:native_app
build_flags =
    ${env:native_app.build_flags}
    -DDETWS_ENABLE_CSRF=1
    -DDETWS_ENABLE_AUTH_LOCKOUT=1
    -DDETWS_ENABLE_IP_ALLOWLIST=1
    -DDETWS_ENABLE_WS_DEFLATE=1
    -DDETWS_ENABLE_TIME_SOURCE=1
    -DDETWS_ENABLE_CONFIG_STORE=1
    -DDETWS_ENABLE_DEVICE_ID=1
    -DDETWS_ENABLE_TELEMETRY=1
    -DDETWS_ENABLE_DASHBOARD=1
    -DDETWS_ENABLE_PARTITION_MONITOR=1
    -DDETWS_ENABLE_CBOR=1
    -DDETWS_ENABLE_MSGPACK=1
build_src_filter =
    ${env:native_app.build_src_filter}
    +<services/csrf/csrf.cpp>
    +<services/auth_lockout/auth_lockout.cpp>
    +<services/time_source/time_source.cpp>
    +<services/config_store/config_store.cpp>
    +<services/device_id/device_id.cpp>
    +<network_drivers/presentation/inflate.cpp>
    +<network_drivers/presentation/ssh/ssh_hmac_sha256.cpp>
    +<services/telemetry/telemetry.cpp>
    +<services/dashboard/dashboard.cpp>
    +<services/dashboard/dashboard_routes.cpp>
    +<services/partition_monitor/partition_monitor.cpp>
    +<services/partition_monitor/partition_monitor_routes.cpp>
    +<network_drivers/presentation/cbor.cpp>
    +<network_drivers/presentation/msgpack.cpp>
test_filter =
    test_dispatch
