    -DDETWS_ENABLE_WS_CLIENT=1
build_src_filter =
    +<services/ws_client/ws_client.cpp>
    +<network_drivers/presentation/sha1.cpp>
    +<network_drivers/presentation/base64.cpp>
test_filter =
    test_ws_client

; Shared per-dispatch scratch arena (session/scratch): bump-allocate + reset
; semantics, alignment, and fail-closed exhaustion. Pure host tests - no
; lwIP/sockets - so it builds from scratch.cpp alone.
[env:native_scratch]
extends = native_base
build_src_filter =
    +<network_drivers/session/scratch.cpp>
test_filter =
    test_scratch

[env:native_snmp_trap]
extends = native_base
build_flags =
    -std=c++14
    -I test/mocks
    -I src
    -DDETWS_ENABLE_SNMP=1
    -DDETWS_ENABLE_SNMP_TRAP=1
build_src_filter =
    +<services/snmp/snmp_notify.cpp>
    +<services/snmp/snmp_ber.cpp>
test_filter =
    test_snmp_trap

; RFC 1951 INFLATE core (the WebSocket permessage-deflate decompressor). Pure
; codec - no sockets - so it unit-tests on the host against zlib-generated
; vectors (scratchpad/gen_vectors.py).
[env:native_inflate]
extends = native_base
build_flags =
    -std=c++14
    -I test/mocks
    -I src
    -DDETWS_ENABLE_WS_DEFLATE=1
build_src_filter =
    +<network_drivers/presentation/inflate.cpp>
test_filter =
    test_inflate

; WebSocket permessage-deflate (RFC 7692) inbound path wired through the real WS
; stack: handshake negotiation, the RSV1 frame path, and INFLATE delivery (with
; the table scratch borrowed from the shared arena). Runs test_websocket with the
; feature on (the deflate cases are #if-gated).
[env:native_ws_deflate]
extends = native_base
build_flags =
    -std=c++14
    -I test/mocks
    -I src
    -DDETWS_ENFORCE_HOST_HEADER=0
    -DDETWS_ENABLE_WS_DEFLATE=1
