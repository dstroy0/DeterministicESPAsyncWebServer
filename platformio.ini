; hardware-verified (the host queue mock ignores the handle).
[env:native_workers]
extends = native_base
build_flags =
    ${native_base.build_flags}
    -DDETWS_WORKER_COUNT=2
build_src_filter =
    +<network_drivers/transport/transport.cpp>
    +<network_drivers/transport/listener.cpp>
    +<network_drivers/session/worker.cpp>
test_filter =
    test_workers

