name=DeterministicESPAsyncWebServer
version=5.74.0
author=Douglas Quigg (dstroy0) <dquigg123@gmail.com>
maintainer=Douglas Quigg (dstroy0) <dquigg123@gmail.com>
sentence=Zero-heap, asynchronous multi-protocol network server for ESP32 with a fully deterministic memory footprint.
paragraph=Serves HTTP/1.1 and HTTP/2 (routes matched in insertion order; the parser validates every request byte-by-byte and auto-sends 400/413/414/501 with no application code), with HTTP/3 over QUIC in progress, plus WebSocket (RFC 6455), Server-Sent Events, Basic/Digest auth, static file serving, multipart, JSON, templating, and a middleware pipeline, plus opt-in HTTPS/TLS, SSH, Telnet, and SNMP (v1/v2c/v3). All buffers are statically sized at compile time and no heap is used after begin(); feature flags strip unused subsystems.
category=Communication
url=https://github.com/dstroy0/DeterministicESPAsyncWebServer
architectures=esp32
