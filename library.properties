sentence=RFC 7230-compliant HTTP/1.1 server for ESP32 with zero heap allocation after begin().
paragraph=Routes are registered with on() and matched in insertion order. The parser validates every request byte-by-byte and auto-sends 400, 413, 414, or 501 without any application code. All buffers are statically sized at compile time — no heap is used after begin().
