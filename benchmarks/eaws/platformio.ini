; ESPAsyncWebServer (ESP32Async fork) benchmark - identical board/core/flags to ../detws.
; WiFi creds from the environment (never committed): export BENCH_WIFI_SSID / BENCH_WIFI_PASS.
[env:esp32s3]
platform = espressif32@6.13.0
board = esp32-s3-devkitc-1
framework = arduino
lib_deps =
    ESP32Async/AsyncTCP
    ESP32Async/ESPAsyncWebServer
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DWIFI_SSID=\"${sysenv.BENCH_WIFI_SSID}\"
    -DWIFI_PASS=\"${sysenv.BENCH_WIFI_PASS}\"
