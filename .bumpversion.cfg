[bumpversion]
current_version = 5.94.1
commit = True
tag = True
tag_name = v{new_version}
sign_tags = True

[bumpversion:file:library.json]
search = "version": "{current_version}"
replace = "version": "{new_version}"

[bumpversion:file:library.properties]
search = version={current_version}
replace = version={new_version}

[bumpversion:file:docs/Doxyfile]
search = PROJECT_NUMBER         = "v{current_version}"
replace = PROJECT_NUMBER         = "v{new_version}"

[bumpversion:file:README.md]
search = v{current_version}
replace = v{new_version}

[bumpversion:file:docs/banner.svg]
search = v{current_version}
replace = v{new_version}

# Supported-versions table: the current release is the only supported version, everything below it is
# not. Bare version search so both table rows (the supported version and the "< version" row) are
# rewritten regardless of prettier's column padding.
[bumpversion:file:.github/SECURITY.md]
search = {current_version}
replace = {new_version}
