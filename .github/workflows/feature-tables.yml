name: Feature Tables

on:
  push:
    branches: [main]

# Do not cancel in progress - let the commit complete cleanly.
concurrency:
  group: feature-tables-${{ github.ref }}
  cancel-in-progress: false

jobs:
  feature-tables:
    name: Regenerate feature tables
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          # Authenticate with the automatic-actions deploy key so the bot commit
          # pushes over SSH past the protected-main ruleset (same as the changelog).
          ssh-key: ${{ secrets.ACTIONS_DEPLOY_KEY }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      # Regenerate README.md / docs/README.md from docs/FEATURES.md so the tables
      # never drift - no contributor has to remember to run the generator.
      - name: Regenerate tables from FEATURES.md
        run: python docs/utilities/gen_feature_tables.py

      # Regenerate the interactive build configurator from DetWebServerConfig.h so it
      # always reflects the current feature flags, tuning knobs, and dependencies.
      - name: Regenerate configurator from DetWebServerConfig.h
        run: python docs/utilities/gen_configurator.py

      # Regenerate the build-flag dependency graph from the #error/#if guards in
      # DetWebServerConfig.h so the README diagram tracks the guards the compiler enforces.
      - name: Regenerate build-flag dependency graph
        run: python docs/utilities/gen_flag_deps.py

      # Regenerate the core API-flow graph from the public API + protocol registry so the
      # README diagram tracks the actual surface and layer wiring.
      - name: Regenerate core API-flow graph
        run: python docs/utilities/gen_api_flow.py

      # Render each diagram .mmd (written by the two generators above) to a light + dark PNG. The
      # READMEs / docs embed the PNGs via <picture> instead of a live mermaid fence, so the diagrams
      # show in the GitHub web UI, the GitHub mobile app, AND Doxygen (the app + Doxygen do not render
      # mermaid). mermaid-cli pulls its own Chromium; the render script passes --no-sandbox for CI.
      - name: Render diagram PNGs
        run: |
          npm install -g @mermaid-js/mermaid-cli@11
          bash tools/render_diagrams.sh

      # Regenerate the per-feature footprint budget table in the README from the isolated
      # measurements in docs/feature_ranges.json (produced periodically by the RPi build matrix,
      # tools/ci/feature_budget.py collect) - a no-op if that file is absent.
      - name: Regenerate footprint budget table
        run: |
          if [ -f docs/feature_ranges.json ]; then
            python tools/ci/feature_budget.py readme docs/feature_ranges.json docs/footprints.json README.md
          fi

      # Regenerate each example's Arduino build_opt.h from its README build_flags so the
      # examples keep building unmodified in the Arduino IDE.
      - name: Regenerate example build_opt.h files
        run: python tools/ci/gen_build_opt.py

      # Regenerate the example index in docs/EXAMPLES.md from the examples/ tree so the
      # per-group lists + total count never drift (the Foundation group had silently lost
      # 16 entries before this was generated).
      - name: Regenerate example index from examples/
        run: python docs/utilities/gen_examples.py

      - name: Format with Prettier
        run: npx prettier@3.9.1 --write README.md docs/README.md docs/EXAMPLES.md

      - name: Configure SSH commit signing
        env:
          CI_SIGNING_KEY: ${{ secrets.CI_SIGNING_KEY }}
        run: |
          # SSH-sign the bot commit (Verified) when the signing key is available;
          # skip signing if the secret is unset so CI never breaks.
          if [ -n "$CI_SIGNING_KEY" ]; then
            mkdir -p ~/.ssh
            printf '%s\n' "$CI_SIGNING_KEY" > ~/.ssh/ci_signing_key
            chmod 600 ~/.ssh/ci_signing_key
            git config gpg.format ssh
            git config user.signingkey ~/.ssh/ci_signing_key
            git config commit.gpgsign true
          fi

      - name: Commit regenerated tables
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "docs: regenerate feature tables + configurator + build_opt.h + example index [skip ci]"
          file_pattern: "README.md docs/README.md docs/ARCHITECTURE.md docs/configurator.html docs/EXAMPLES.md docs/diagrams/* examples/*/*/build_opt.h"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
