name: Test & Analyze

# Runs the native Unity suite and gets both outputs from one instrumented pass: test/TEST_REPORT.md
# (the human report) and test/coverage.xml (for the SonarCloud scan).
#
# Affected-only by default: most commits touch one feature's .cpp + its test_x/ dir, so this maps the
# diff to just the envs that changed (test/select_envs.py) and runs only those, then folds the results
# back into the committed whole:
#   * test/TEST_REPORT.md  - the touched (suite, env) rows/sections are replaced (merge_report.py),
#                            every other suite kept verbatim, header totals recomputed;
#   * test/coverage.xml    - the changed sources' fresh coverage overlays the committed baseline
#                            (merge_coverage.py --baseline), so the report stays whole-project and
#                            SonarCloud still sees full coverage.
#
# The whole matrix runs (and both artifacts are regenerated from scratch) when ANY of these hold:
#   * a shared/core/header/config/tooling file changed (select_envs.py returns FULL - the safe default);
#   * the commit message contains [ci full] (or [full ci]);
#   * the PR carries the 'full-ci' label;
#   * the workflow_dispatch 'full' input is true.
# A docs-only diff maps to NONE and skips the suite entirely.
#
# ccache (auto-detected by run_tests.sh) caches the repeated library + Unity compiles across envs and,
# via the ~/.ccache cache, across runs, so even a full run stays warm.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      full:
        description: "Run the whole matrix + regenerate coverage from scratch (ignore affected-env selection)"
        type: boolean
        default: false

concurrency:
  group: test-analyze-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-analyze:
    name: Run affected suite (report + coverage) and scan
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # With no SONAR_TOKEN the scan steps are skipped (the report + coverage still run); a quick green
      # job until the secret is configured. SonarCloud C/C++ needs this CI scan (auto-analysis can't).
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history: the diff base, the report commit, SonarCloud new-code attribution
          # Authenticate with the automatic-actions deploy key so the report commit pushes over SSH
          # (past the protected-main ruleset), which a GITHUB_TOKEN push cannot.
          ssh-key: ${{ secrets.ACTIONS_DEPLOY_KEY }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      # Restore the PlatformIO toolchain + the ccache store before building. ccache keys on the
      # preprocessed source + flags, so identical compiles hit across envs and (thanks to this cache)
      # across runs. The key busts on platformio.ini changes; restore-keys keeps a warm cache.
      - name: Cache PlatformIO + ccache
        uses: actions/cache@v6
        with:
          path: |
            ~/.platformio
            ~/.ccache
          key: test-analyze-${{ hashFiles('platformio.ini') }}
          restore-keys: test-analyze-

      - name: Install PlatformIO + gcovr + ccache
        # gcovr is pinned: an unpinned drift to 8.6+ changed --filter anchoring and silently emptied
        # every coverage report (0% on Sonar). ccache provides the /usr/lib/ccache masquerade dir that
        # run_tests.sh auto-detects.
        run: |
          pip install --upgrade platformio 'gcovr==8.6'
          sudo apt-get update && sudo apt-get install -y ccache

      - name: Check platformio.ini is in sync with the test matrix
        run: python3 test/gen_test_envs.py --check

      # Map the diff to the envs it affects (or FULL / NONE). Writes changed_src.txt (the changed
      # sources, the coverage replace-set) and exposes mode + the env list.
      - name: Select affected envs
        id: sel
        env:
          EVENT: ${{ github.event_name }}
          DISPATCH_FULL: ${{ github.event.inputs.full }}
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
          BEFORE: ${{ github.event.before }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -e
          if [ "$EVENT" = "pull_request" ]; then BASE="$PR_BASE"; HEAD="$PR_HEAD"; else BASE="$BEFORE"; HEAD="$HEAD_SHA"; fi

          FORCE=0
          [ "$DISPATCH_FULL" = "true" ] && FORCE=1
          printf '%s' "$PR_LABELS" | grep -q '"full-ci"' && FORCE=1 || true
          if git rev-parse --verify -q "$HEAD^{commit}" >/dev/null; then
            git log -1 --format=%B "$HEAD" | grep -qiE '\[(ci )?full( ci)?\]' && FORCE=1 || true
          fi

          : > changed_src.txt
          if [ "$FORCE" = "1" ]; then
            SEL="FULL"
          elif [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ] \
               || ! git rev-parse --verify -q "$BASE^{commit}" >/dev/null; then
            SEL="FULL" # first push on a branch / unknown base -> be safe
          else
            git diff --name-only "$BASE" "$HEAD" > changed_all.txt
            SEL="$(python3 test/select_envs.py < changed_all.txt)"
            grep -E '^src/.*\.(cpp|c)$' changed_all.txt > changed_src.txt || true
          fi

          if [ "$SEL" = "FULL" ]; then MODE=full; ENVS="";
          elif [ "$SEL" = "NONE" ]; then MODE=none; ENVS="";
          else MODE=affected; ENVS="$SEL"; fi
          echo "Selection: mode=$MODE envs=[$ENVS]"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "envs=$ENVS" >> "$GITHUB_OUTPUT"

      # The SonarCloud C/C++ analysis needs a compile database (native platform, all envs merged). Skip
      # it when nothing testable changed. compiledb captures compile commands (no test execution) and is
      # ccache-warm, so it stays cheap even on affected runs.
      - name: Generate merged compile_commands.json
        if: ${{ env.SONAR_TOKEN != '' && steps.sel.outputs.mode != 'none' }}
        run: bash tools/sonar/gen_compiledb.sh

      # FULL: regenerate test/TEST_REPORT.md + test/coverage.xml from the whole matrix.
      - name: Run the whole suite (report + coverage)
        if: ${{ steps.sel.outputs.mode == 'full' }}
        run: bash test/run_tests.sh --coverage || true

      # AFFECTED: run only the touched envs, then overlay onto the committed report + coverage baseline.
      - name: Run the affected suite and merge
        if: ${{ steps.sel.outputs.mode == 'affected' }}
        run: |
          bash test/run_tests.sh --coverage \
            --report-out partial_report.md \
            --cov-baseline test/coverage.xml --cov-changed changed_src.txt \
            ${{ steps.sel.outputs.envs }} || true
          python3 test/merge_report.py test/TEST_REPORT.md partial_report.md test/TEST_REPORT.md
          rm -f partial_report.md changed_all.txt changed_src.txt

      - name: Format TEST_REPORT.md with Prettier
        if: ${{ steps.sel.outputs.mode != 'none' }}
        run: npx prettier@3.9.1 --write test/TEST_REPORT.md

      - name: Commit updated report + coverage
        if: ${{ github.event_name == 'push' && steps.sel.outputs.mode != 'none' }}
        env:
          CI_SIGNING_KEY: ${{ secrets.CI_SIGNING_KEY }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # SSH-sign the bot commit (Verified) when the signing key is available; commit unsigned if
          # the secret is unset so CI never breaks.
          if [ -n "$CI_SIGNING_KEY" ]; then
            mkdir -p ~/.ssh
            printf '%s\n' "$CI_SIGNING_KEY" > ~/.ssh/ci_signing_key
            chmod 600 ~/.ssh/ci_signing_key
            git config gpg.format ssh
            git config user.signingkey ~/.ssh/ci_signing_key
            git config commit.gpgsign true
          fi
          git add test/TEST_REPORT.md test/coverage.xml
          if ! git diff --cached --quiet; then
            git commit -m "ci: update test report + coverage [skip ci]"
            # Rebase-and-retry: other auto-committing workflows advance main during this multi-minute run.
            for i in 1 2 3 4 5; do
              if git pull --rebase origin main && git push; then exit 0; fi
              echo "push rejected (attempt $i/5), retrying"
              sleep 5
            done
            echo "Failed to push after 5 attempts."
            exit 1
          else
            echo "Report + coverage unchanged."
          fi

      - name: SonarQube Scan
        if: ${{ env.SONAR_TOKEN != '' && steps.sel.outputs.mode != 'none' }}
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_HOST_URL: https://sonarcloud.io
