name: Test Report

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: test-report-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-report:
    name: Run native test suites and publish report
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # Authenticate with the automatic-actions deploy key so the test-report
          # commit pushes over SSH - this can pass the protected-main ruleset and
          # trigger downstream workflows, which a GITHUB_TOKEN push cannot.
          ssh-key: ${{ secrets.ACTIONS_DEPLOY_KEY }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Run tests and regenerate docs/TEST_REPORT.md
        run: bash test/run_tests.sh || true

      - name: Format TEST_REPORT.md with Prettier
        run: npx prettier@3.9.1 --write docs/TEST_REPORT.md

      - name: Commit updated test report
        env:
          CI_SIGNING_KEY: ${{ secrets.CI_SIGNING_KEY }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # SSH-sign the bot commit (Verified) when the signing key is available;
          # commit unsigned if the secret is unset so CI never breaks.
          if [ -n "$CI_SIGNING_KEY" ]; then
            mkdir -p ~/.ssh
            printf '%s\n' "$CI_SIGNING_KEY" > ~/.ssh/ci_signing_key
            chmod 600 ~/.ssh/ci_signing_key
            git config gpg.format ssh
            git config user.signingkey ~/.ssh/ci_signing_key
            git config commit.gpgsign true
          fi
          if ! git diff --quiet -- docs/TEST_REPORT.md; then
            git add docs/TEST_REPORT.md
            git commit -m "ci: update test report [skip ci]"
            for i in {1..5}; do
              echo "Attempt $i to push changes..."
              if git pull --rebase origin main && git push; then
                echo "Successfully pushed!"
                exit 0
              fi
              echo "Push failed, retrying in 5 seconds..."
              sleep 5
            done
            echo "Failed to push after 5 attempts."
            exit 1
          else
            echo "Test report unchanged."
          fi
