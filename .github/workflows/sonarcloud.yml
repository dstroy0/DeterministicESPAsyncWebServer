name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# One scan at a time per ref; a newer push cancels an in-flight scan so two
# analyses never race the same SonarCloud project.
concurrency:
  group: sonarcloud-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    env:
      # Gates every heavy step below: with no SONAR_TOKEN secret the job is a quick
      # green no-op (no wasted compiledb build, no failing scan) until configured.
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so SonarCloud can attribute new code / blame

      - name: Skip notice
        if: ${{ env.SONAR_TOKEN == '' }}
        run: |
          echo "SONAR_TOKEN is not set - skipping the SonarCloud scan."
          echo "To enable: add the SONAR_TOKEN repo secret AND disable Automatic"
          echo "Analysis in the SonarCloud project (C/C++ needs this CI scan)."

      - name: Set up Python
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache PlatformIO
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: actions/cache@v6
        with:
          path: |
            ~/.platformio
            .pio
            .pio_cov
          key: pio-sonar-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO + gcovr
        if: ${{ env.SONAR_TOKEN != '' }}
        run: pip install --upgrade platformio gcovr

      - name: Generate merged compile_commands.json
        if: ${{ env.SONAR_TOKEN != '' }}
        run: bash tools/sonar/gen_compiledb.sh

      - name: Generate coverage (instrumented native tests -> coverage.xml)
        if: ${{ env.SONAR_TOKEN != '' }}
        run: bash tools/sonar/gen_coverage.sh

      - name: SonarQube Scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_HOST_URL: https://sonarcloud.io # SonarQube Cloud (SonarCloud) endpoint
