name: Changelog

on:
  push:
    branches: [main]

# Do not cancel in progress - let the commit complete cleanly.
concurrency:
  group: changelog-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changelog:
    name: Update CHANGELOG.md
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # git-cliff needs full history to build the log
          # Authenticate with the automatic-actions deploy key so the changelog
          # commit pushes over SSH - this can pass the protected-main ruleset and
          # trigger downstream workflows, which a GITHUB_TOKEN push cannot.
          ssh-key: ${{ secrets.ACTIONS_DEPLOY_KEY }}

      - name: Generate CHANGELOG.md
        uses: orhun/git-cliff-action@v4
        with:
          config: docs/cliff.toml
          args: --verbose
        env:
          OUTPUT: docs/CHANGELOG.md

      - name: Decorate CHANGELOG.md with collapsible sections
        run: python docs/utilities/decorate_changelog.py

      - name: Format CHANGELOG.md with Prettier
        run: npx prettier --write docs/CHANGELOG.md

      - name: Commit changelog
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update CHANGELOG.md [skip ci]"
          file_pattern: docs/CHANGELOG.md
