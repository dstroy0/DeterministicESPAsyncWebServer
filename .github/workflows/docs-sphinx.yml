name: Docs (Sphinx)

# Build the Sphinx-over-Doxygen site (Breathe bridge + the "squirty" Furo theme) so it stays buildable.
# The existing "Docs" workflow owns the GitHub Pages deploy (Doxygen HTML); this one verifies the Sphinx
# site builds and uploads it as an artifact - promoting it to the published site is a separate decision.

on:
  push:
    branches: [main]
    paths:
      - "docs/sphinx/**"
      - "docs/Doxyfile"
      - "docs/ARCHITECTURE.md"
      - "docs/learn/**"
      - "src/**"
      - ".github/workflows/docs-sphinx.yml"

concurrency:
  group: docs-sphinx-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sphinx:
    name: Sphinx + Breathe (Doxygen XML)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Doxygen + Graphviz
        run: sudo apt-get update -qq && sudo apt-get install -y doxygen graphviz

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Sphinx deps
        run: pip install -r docs/sphinx/requirements.txt

      - name: Generate the Doxygen XML (consumed by Breathe)
        run: doxygen docs/Doxyfile

      - name: Build the Sphinx site
        run: sphinx-build -b html docs/sphinx docs/sphinx/_build/html

      - name: Upload the site artifact
        uses: actions/upload-artifact@v4
        with:
          name: sphinx-site
          path: docs/sphinx/_build/html
          retention-days: 14
