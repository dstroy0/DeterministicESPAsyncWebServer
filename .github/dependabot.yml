version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily" # Can be daily, weekly, or monthly

  # Node-based dev/CI tooling declared in package.json (prettier, cspell).
  # Lets the dependency graph + Dependabot track and bump them so we can keep
  # the toolchain minimal. The library itself has no runtime npm dependencies.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"