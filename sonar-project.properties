# SonarCloud / SonarQube project configuration.
#
# IMPORTANT: C/C++ is NOT supported by SonarCloud "Automatic Analysis". Turn it OFF
# (SonarCloud project -> Administration -> Analysis Method -> disable Automatic
# Analysis) or the CI-based scan below is rejected as a conflicting analysis.
#
# These two keys follow SonarCloud's default GitHub-import convention; verify them
# against your actual project (SonarCloud -> Information).
sonar.projectKey=dstroy0_DeterministicESPAsyncWebServer
sonar.organization=dstroy0
sonar.projectName=DeterministicESPAsyncWebServer

sonar.sources=src
sonar.tests=test
sonar.sourceEncoding=UTF-8

# Analyze ALL of src/ recursively. This overrides a stale instance-level
# sonar.inclusions=src/* (NON-recursive) that had collapsed the whole analysis to
# the three files directly in src/ - so coverage was measured against one file
# (the bogus "68%") and every nested codec/service was invisible. Must stay src/**.
sonar.inclusions=src/**

# The C/C++ analyzer needs a compilation database. It is generated in CI by
# tools/sonar/gen_compiledb.sh (merged across every native env so feature-gated
# files are covered) and is git-ignored (machine-specific paths).
sonar.cfamily.compile-commands=compile_commands.json

# Coverage: the native Unity tests run with gcov instrumentation, gcovr emits one report per env, and
# merge_coverage.py unions them into this SonarQube generic-coverage report (src/ only). It is COMMITTED
# and updated incrementally by the Test & Analyze workflow - an affected-only run overlays the changed
# sources' fresh coverage onto the committed baseline, so this stays whole-project on every push.
sonar.coverageReportPaths=test/coverage.xml

# Coverage exclusions: code with no host execution path, so the native Unity tests
# cannot cover it (it only runs on the ESP32). These are platform I/O glue - raw
# lwIP transport, WiFi/Ethernet physical, and mbedTLS - NOT codecs/parsers/services,
# which must stay host-tested. The SSH connection glue (presentation/ssh/connection)
# IS host-testable through the tcp_write capture mock, so it is covered by tests, not
# file-excluded; the few genuinely-unreachable lines there carry an inline GCOVR_EXCL.
# (The previous ssh_conn.cpp / ssh_forward.cpp entries were stale - they pointed at
# .../ssh/ not .../ssh/connection/ - so they excluded nothing.)
sonar.coverage.exclusions=src/network_drivers/transport/**,src/network_drivers/physical/**,src/network_drivers/tls/**

# Generated string-literal asset headers and the web wizard are not hand-written.
sonar.exclusions=src/network_drivers/application/web_assets.*,src/web/**

# ---------------------------------------------------------------------------
# Rule suppressions - version-controlled, reviewable (equivalent to disabling a
# rule in the quality profile). These are NOT bugs waived away: each rule below
# conflicts with a DELIBERATE, DOCUMENTED design constraint of this library, so
# it fires on correct-by-design code. Genuine findings (cognitive complexity
# S3776, deep nesting S134, const-correctness S5817, dead code S125, security
# hotspots) are intentionally NOT suppressed.
# ---------------------------------------------------------------------------
sonar.issue.ignore.multicriteria=carr,gmut,fptr,cmac,wbnd,hdr,mpar,vptr,rfor,rtyp,dstruct

# S5945 "use std::array/std::vector instead of a C-style array": this is a no-heap,
# no-stdlib, deterministic embedded library (see docs; <cstdlib>/STL containers are
# banned in src/). Fixed C arrays + static pools ARE the design.
sonar.issue.ignore.multicriteria.carr.ruleKey=cpp:S5945
sonar.issue.ignore.multicriteria.carr.resourceKey=**/*

# S5421 "global variables should be const": the owner-context architecture keeps each
# subsystem's mutable state in ONE named, internal-linkage owned <Name>Ctx instance
# (enforced by tools/check_owned_context.py). Those owners are mutable by design.
sonar.issue.ignore.multicriteria.gmut.ruleKey=cpp:S5421
sonar.issue.ignore.multicriteria.gmut.resourceKey=**/*

# S5205 "replace this function pointer with a template parameter or std::function":
# std::function allocates; callbacks here are plain C function pointers by design.
sonar.issue.ignore.multicriteria.fptr.ruleKey=cpp:S5205
sonar.issue.ignore.multicriteria.fptr.resourceKey=**/*

# S5028 "replace this macro by const/constexpr/enum": ServerConfig.h defaults are
# preprocessor-overridable on purpose (#ifndef X #define X ... #endif), which constexpr
# cannot be. Scoped to the config header so genuine magic-number macros still flag.
sonar.issue.ignore.multicriteria.cmac.ruleKey=cpp:S5028
sonar.issue.ignore.multicriteria.cmac.resourceKey=**/ServerConfig.h

# S3519 "memory copy overflows the destination buffer": FALSE POSITIVE on the bounded
# Writer in tls13_msg.cpp - every memcpy is guarded by pos<=cap && n<=cap-pos (no
# underflow, no pos+n wrap), but buf/cap are separate params so the analyzer cannot
# prove buf has cap bytes. Scoped to that one file (its writer is entirely this pattern).
sonar.issue.ignore.multicriteria.wbnd.ruleKey=cpp:S3519
sonar.issue.ignore.multicriteria.wbnd.resourceKey=**/tls13_msg.cpp

# S125 "remove this commented-out code": FALSE POSITIVE on the ServerConfig.h section
# headers ("// -- Name (services/x) --") - the parens/slashes trip the commented-code
# heuristic. They are documentation that organizes 100+ config macros, not dead code.
sonar.issue.ignore.multicriteria.hdr.ruleKey=cpp:S125
sonar.issue.ignore.multicriteria.hdr.resourceKey=**/ServerConfig.h

# S107 "function has too many parameters": the flat wire codecs (mqtt_build_publish,
# coap/dns/snmp build+parse, ...) take the message fields as positional args by design - a
# no-heap deterministic library avoids per-call option structs. Same flat-C-API stance as the
# S5205 function-pointers above; a codec taking 8-9 wire fields is correct, not a smell.
sonar.issue.ignore.multicriteria.mpar.ruleKey=cpp:S107
sonar.issue.ignore.multicriteria.mpar.resourceKey=**/*

# S5008 "replace this void* with a meaningful type": the callback seams pass an opaque
# `void *ctx` (smtp/coap/dns send-recv, resource handlers, ...) - a plain-C callback design
# (cf. S5205), where a typed context would force templates/std::function, both banned here (no
# allocation, C ABI). The void* IS the interface.
sonar.issue.ignore.multicriteria.vptr.ruleKey=cpp:S5008
sonar.issue.ignore.multicriteria.vptr.resourceKey=**/*

# S5566 "change this raw for-loop to a range-for": this C-leaning library uses explicit
# index-based loops uniformly (zero range-for across src/). Over a fixed C array range-for is
# identical codegen (no performance gain), and adopting it for only the subset the analyzer
# recognizes would fragment the deliberate style. Index loops ARE the design.
sonar.issue.ignore.multicriteria.rfor.ruleKey=cpp:S5566
sonar.issue.ignore.multicriteria.rfor.resourceKey=**/*

# S5827 "replace the redundant type with auto": the `auto` keyword is banned in src/ - every
# type is spelled out explicitly (same explicit-C stance as the index loops above). This rule's
# only fix is to introduce `auto`, which the library's style forbids.
sonar.issue.ignore.multicriteria.rtyp.ruleKey=cpp:S5827
sonar.issue.ignore.multicriteria.rtyp.resourceKey=**/*

# S1820 "refactor this structure to have fewer than 20 fields": DtlsConn is the single owned
# per-connection state aggregate for a DTLS 1.3 server handshake (keys/seqnos/replay windows per
# epoch, CID, PTO timers, transcript hash, peer address). A flat no-heap connection struct - all
# state in one named owner - IS the owner-context design (tools/check_owned_context.py); splitting
# it into sub-structs would ripple through every c->field access for no design gain. Scoped to it.
sonar.issue.ignore.multicriteria.dstruct.ruleKey=cpp:S1820
sonar.issue.ignore.multicriteria.dstruct.resourceKey=**/dtls_conn.h
