# SonarCloud / SonarQube project configuration.
#
# IMPORTANT: C/C++ is NOT supported by SonarCloud "Automatic Analysis". Turn it OFF
# (SonarCloud project -> Administration -> Analysis Method -> disable Automatic
# Analysis) or the CI-based scan below is rejected as a conflicting analysis.
#
# These two keys follow SonarCloud's default GitHub-import convention; verify them
# against your actual project (SonarCloud -> Information).
sonar.projectKey=dstroy0_DeterministicESPAsyncWebServer
sonar.organization=dstroy0
sonar.projectName=DeterministicESPAsyncWebServer

sonar.sources=src
sonar.tests=test
sonar.sourceEncoding=UTF-8

# Analyze ALL of src/ recursively. This overrides a stale instance-level
# sonar.inclusions=src/* (NON-recursive) that had collapsed the whole analysis to
# the three files directly in src/ - so coverage was measured against one file
# (the bogus "68%") and every nested codec/service was invisible. Must stay src/**.
sonar.inclusions=src/**

# The C/C++ analyzer needs a compilation database. It is generated in CI by
# tools/sonar/gen_compiledb.sh (merged across every native env so feature-gated
# files are covered) and is git-ignored (machine-specific paths).
sonar.cfamily.compile-commands=compile_commands.json

# Coverage: tools/sonar/gen_coverage.sh runs the native Unity tests with gcov
# instrumentation, gcovr emits one report per env, and merge_coverage.py unions
# them into this SonarQube generic-coverage report (src/ only). Git-ignored;
# regenerated in CI.
sonar.coverageReportPaths=coverage.xml

# Coverage exclusions: code with no host execution path, so the native Unity tests
# cannot cover it (it only runs on the ESP32). These are platform I/O glue - raw
# lwIP transport, WiFi/Ethernet physical, mbedTLS, and the SSH socket bridges
# (det_conn / det_client) - NOT codecs/parsers/services, which must stay host-tested.
sonar.coverage.exclusions=src/network_drivers/transport/**,src/network_drivers/physical/**,src/network_drivers/tls/**,src/network_drivers/presentation/ssh/ssh_conn.cpp,src/network_drivers/presentation/ssh/ssh_forward.cpp

# Generated string-literal asset headers and the web wizard are not hand-written.
sonar.exclusions=src/network_drivers/application/web_assets.*,src/web/**
