; Shared PlatformIO settings for every on-device CCOUNT microbenchmark under perf/.
; Each feature's own platformio.ini pulls this in with `extra_configs = <rel>/common.ini`,
; `extends = common_s3`, and adds its own `lib_deps` symlink + `-I<rel>/common` (relative depth
; varies by layer) plus its `-DDWS_ENABLE_*` flags. Board/core match perf/library_comparison/detws.
[common_s3]
platform = espressif32@6.13.0
board = esp32-s3-devkitc-1
framework = arduino
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
