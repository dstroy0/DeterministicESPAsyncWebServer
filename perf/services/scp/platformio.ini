; On-device CCOUNT microbenchmark. See perf/README.md.
[platformio]
extra_configs = ../../common.ini

[env:esp32s3]
extends = common_s3
lib_deps = symlink://../../../
build_flags =
    ${common_s3.build_flags}
    -I../../common
    -DDWS_ENABLE_SSH=1
    -DDWS_ENABLE_FILE_SERVING=1
    -DDWS_ENABLE_SSH_SCP=1
