; On-device CCOUNT microbenchmark. See perf/README.md.
[platformio]
extra_configs = ../../common.ini

[env:esp32s3]
extends = common_s3
lib_deps = symlink://../../../
build_flags =
    ${common_s3.build_flags}
    -I../../common
    -DBODY_BUF_SIZE=512
    -DDWS_ENFORCE_HOST_HEADER=0
    -DDWS_ENABLE_STATS=1
    -DDWS_ENABLE_METRICS=1
    -DDWS_ENABLE_ETAG=1
    -DDWS_ENABLE_WEB_TERMINAL=1
    -DDWS_HTTP_EMIT_DATE=1
