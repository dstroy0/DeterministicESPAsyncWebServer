; On-device CCOUNT microbenchmark. See perf/README.md.
[platformio]
extra_configs = ../../common.ini

[env:esp32s3]
extends = common_s3
lib_deps = symlink://../../../
build_flags =
    ${common_s3.build_flags}
    -I../../common
    -DDWS_ENABLE_DMA=1
    -DDWS_DMA_BUF_SIZE=8
    -DDWS_DMA_CHANNELS=2
