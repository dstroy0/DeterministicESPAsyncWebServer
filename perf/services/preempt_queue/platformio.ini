; On-device CCOUNT microbenchmark. See perf/README.md.
[platformio]
extra_configs = ../../common.ini

[env:esp32s3]
extends = common_s3
lib_deps = symlink://../../../
build_flags =
    ${common_s3.build_flags}
    -I../../common
    -DDWS_ENABLE_PREEMPT_QUEUE=1
    -DDWS_PQ_DEPTH=4
    -DDWS_PQ_ITEM_SIZE=4
