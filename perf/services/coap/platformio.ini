; On-device CCOUNT microbenchmark. See perf/README.md.
[platformio]
extra_configs = ../../common.ini

[env:esp32s3]
extends = common_s3
lib_deps = symlink://../../../
build_flags =
    ${common_s3.build_flags}
    -I../../common
    -DDWS_ENABLE_COAP=1
    -DDWS_ENABLE_COAP_BLOCK=1
    -DDWS_COAP_BLOCK_SZX_MAX=2
    -DDWS_COAP_BLOCK1_MAX=128
